name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Materialize pinned toolchain
        run: cargo --version

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            editors/zed

      - name: Install uv (runs the pinned ruff)
        uses: astral-sh/setup-uv@v5

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build Zed extension (wasm)
        run: cargo build --release --manifest-path editors/zed/Cargo.toml --target wasm32-wasip1
