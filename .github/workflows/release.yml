name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach assets to"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin, ext: tar.gz }
          - { os: macos-14, target: x86_64-apple-darwin, ext: tar.gz }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, ext: tar.gz }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, ext: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: zip }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Build server
        run: cargo build --release --locked -p ansible-lens-lsp --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.ext == 'tar.gz'
        run: |
          tar -czf "ansible-lens-lsp-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" ansible-lens-lsp

      - name: Package (windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/ansible-lens-lsp.exe" `
            -DestinationPath "ansible-lens-lsp-${{ matrix.target }}.zip"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ansible-lens-lsp-${{ matrix.target }}.${{ matrix.ext }}
